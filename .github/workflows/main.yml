name: 🛠️ Kernel Builder

on:
  workflow_dispatch:
    inputs:
      user:
        description: "👨‍💻 Repository_Owner"
        required: true
        default: "sa9990"
        type: string
      repo:
        description: "🏠 Repository"
        required: true
        default: "Source"
        type: string
      branch:
        description: "⚙️ Branch"
        required: true
        default: "X"
        type: string
      clang_type:
        description: "🛠️ Clang_Type (aosp or neutron)"
        required: true
        default: "neutron"
        type: choice
        options:
          - aosp
          - neutron
      clang_url:
        description: "🔗 AOSP Clang URL (if using aosp)"
        required: false
        default: "https://github.com/SA9990/Toolchain/releases/download/toolchain/clang-r522817.tar.gz"
        type: string
      config:
        description: "📄 Device_Defconfig"
        required: true
        default: "vendor/obiwan_defconfig"
        type: string
      ksu:
        description: "⚠️ Integrate KernelSU"
        required: false
        type: choice
        options:
          - Yes
          - No
      LocalVersion:
        description: "📄 Set custom localversion"
        required: false
        type: string
      cmd:
        description: "📜 Extra_Make_cmd"
        required: false
        default: "-s"
        type: string

env:
  TZ: Asia/Kolkata
  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
  DEVICE: Obiwan

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Checkout Kernel Source
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ inputs.user }}/${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          path: ${{ inputs.repo }}
          fetch-depth: 1
          show-progress: false

      - name: Install Build Dependencies
        run: |
          sudo apt update && sudo apt full-upgrade -y > /dev/null 2>&1
          sudo apt install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libx11-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 aria2 > /dev/null 2>&1
          sudo apt autoremove --purge -y && sudo apt clean > /dev/null 2>&1

      - name: Set up Toolchain
        run: |
          TOOLCHAIN_DIR="$HOME/toolchains"
          mkdir -p "$TOOLCHAIN_DIR"

          if [[ "${{ inputs.clang_type }}" == "aosp" ]]; then
            echo "Using AOSP Clang"
            mkdir -p "$TOOLCHAIN_DIR/aosp-clang"
            cd "$TOOLCHAIN_DIR/aosp-clang"
            curl -L "${{ inputs.clang_url }}" -o clang.tar.gz
            tar -xzf clang.tar.gz
            echo "TOOLCHAIN_PATH=$TOOLCHAIN_DIR/aosp-clang/bin" >> $GITHUB_ENV
            echo "TOOLCHAIN_NAME=AOSP" >> $GITHUB_ENV
          else
            echo "Using Neutron Clang"
            mkdir -p "$TOOLCHAIN_DIR/neutron-clang"
            cd "$TOOLCHAIN_DIR/neutron-clang"
            curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
            chmod +x antman
            ./antman -S
            echo "TOOLCHAIN_PATH=$TOOLCHAIN_DIR/neutron-clang/bin" >> $GITHUB_ENV
            echo "TOOLCHAIN_NAME=Neutron" >> $GITHUB_ENV
          fi

      - name: Set localversion into kernel config
        working-directory: ${{ inputs.repo }}
        run: |
          if [[ ! -z "${{ inputs.LocalVersion }}" ]]; then
            sed -i '\#CONFIG_LOCALVERSION#d' arch/arm64/configs/${{ inputs.config }}
            echo >> arch/arm64/configs/${{ inputs.config }}
            echo 'CONFIG_LOCALVERSION_AUTO=n' >> arch/arm64/configs/${{ inputs.config }}
            echo 'CONFIG_LOCALVERSION="${{ inputs.LocalVersion }}"' >> arch/arm64/configs/${{ inputs.config }}
          else
            sed -i '\#CONFIG_LOCALVERSION#d' arch/arm64/configs/${{ inputs.config }}
            echo 'CONFIG_LOCALVERSION_AUTO=n' >> arch/arm64/configs/${{ inputs.config }}
          fi

      - name: Integrate KernelSU
        working-directory: ${{ inputs.repo }}
        run: |
          if [[ "${{ inputs.ksu }}" == "true" ]]; then
            sed -i '\#endmenu#d' drivers/Kconfig
            echo >> drivers/Kconfig
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
            echo >> drivers/Kconfig
            echo 'endmenu' >> drivers/Kconfig
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            echo 'CONFIG_KSU=y' >> arch/arm64/configs/${{ inputs.config }}
          else
            rm -rf drivers/kernelsu
            sed -i '\#source "drivers/kernelsu/Kconfig"#d' drivers/Kconfig
            sed -i '\#endmenu#d' drivers/Kconfig
            echo >> drivers/Kconfig
            echo 'endmenu' >> drivers/Kconfig
            sed -i '/obj-$(CONFIG_KSU) += kernelsu\//d' drivers/Makefile
          fi

      - name: Configure and Build Kernel
        working-directory: ${{ inputs.repo }}
        run: |
          export PATH="${{ env.TOOLCHAIN_PATH }}:$PATH"
          make distclean
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 ${{ inputs.cmd }} ${{ inputs.config }}
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 ${{ inputs.cmd }} all

      - name: Generate Defconfig
        working-directory: ${{ inputs.repo }}
        run: |
          mv out/.config out/${{ env.DEVICE }}.txt

      - name: Merge DTBs
        working-directory: ${{ inputs.repo }}
        run: |
          find out/arch/arm64/boot/dts/vendor -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

      - name: Set Build Timestamp
        run: |
          echo "IST_TIME=$(date +"%Y-%m-%d_%H-%M")" >> $GITHUB_ENV

      - name: Package with AnyKernel3
        run: |
          export TZ=Asia/Kolkata
          IST_TIME=$(date +"%Y-%m-%d_%H-%M")
          ZIP_NAME="${IST_TIME}.zip"
          echo "$ZIP_NAME" > zip_name.txt

          git clone https://github.com/SA9990/AK3_obiwan.git
          cp ${{ inputs.repo }}/out/arch/arm64/boot/Image AK3_obiwan/
          cp ${{ inputs.repo }}/out/arch/arm64/boot/dtb AK3_obiwan/
          find ${{ inputs.repo }}/out/ -type f -name "*.ko" -exec cp {} AK3_obiwan/modules/system/lib/modules/ \; || true
          find ${{ inputs.repo }}/out/ -type f -name "dtbo.img" -exec cp {} AK3_obiwan/ \; || true

          cd AK3_obiwan
          zip -r9 "../$ZIP_NAME" * -x .git README.md *placeholder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: "${{ inputs.repo }}_${{ inputs.branch }}"
          name: "${{ env.DEVICE }}_${{ env.IST_TIME }}"
          body: |
            🗓️ build_date : ${{ env.IST_TIME }}
            🌐 repo_owner : ${{ inputs.user }}
            🌐 repository : ${{ inputs.repo }}
            🌐 branch     : ${{ inputs.branch }}
            📄 Defconfig  : ${{ inputs.config }}
            🔧 Toolchain  : ${{ env.TOOLCHAIN_NAME }}
          files: |
            ${{ github.workspace }}/*.zip
            ${{ github.workspace }}/${{ inputs.repo }}/out/${{ env.DEVICE }}.txt
